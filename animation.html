<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Weather Bridge Collapse</title>
    <style>
        /* CSS Variables for Dynamic Weather/Time Themes */
        :root {
            /* SUNRISE (SUMMER DAY) DEFAULTS */
            --sun-y: 220px;
            --cloud-opacity: 0.9;
            --cloud-color: 255, 255, 255;
            
            /* Mountains */
            --mount-b1: #A5D6A7;
            --mount-f1: #81C784;
            
            /* Water */
            --water-w1: rgba(255, 255, 255, 0.4);
            --water-w2: rgba(179, 229, 252, 0.6);
            --water-w3: rgba(79, 195, 247, 0.8);
            --water-base: #039BE5;

            /* Bridge Materials (Lighter for day) */
            --tower-light: #C0B8AC;
            --tower-dark: #A59B8B;
            --deck-top: #959390;
            --deck-side: #757370;
        }

        #scene.sunset-mode {
            /* SUNSET DEFAULTS */
            --sun-y: 60px; /* Sun moves down */
            --cloud-opacity: 0.25;
            --cloud-color: 255, 200, 200;
            
            /* Mountains (Silhouettes) */
            --mount-b1: #2c1e3a;
            --mount-f1: #1a1124;
            
            /* Water (Reflecting sunset) */
            --water-w1: rgba(255, 128, 8, 0.3);
            --water-w2: rgba(139, 43, 61, 0.5);
            --water-w3: rgba(48, 43, 99, 0.7);
            --water-base: #0f172a;

            /* Bridge Materials (Darker/Shadowed) */
            --tower-light: #7a7369;
            --tower-dark: #4a453e;
            --deck-top: #7a7874;
            --deck-side: #4a4947;
        }

        /* Base Scene Setup */
        body {
            margin: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh;
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container { position: relative; }

        #scene {
            position: relative; width: 900px; height: 550px;
            overflow: hidden; border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.2);
        }

        /* --- Dynamic Sky Backgrounds --- */
        #sky-sunrise, #sky-sunset {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
            transition: opacity 2s ease-in-out;
        }
        /* Summer bright sky */
        #sky-sunrise {
            background: linear-gradient(to bottom, #2193b0 0%, #6dd5ed 100%);
            opacity: 1;
        }
        /* Sunset dramatic sky */
        #sky-sunset {
            background: linear-gradient(to bottom, #102131 0%, #302b63 45%, #8b2b3d 75%, #ff8008 100%);
            opacity: 0;
        }
        #scene.sunset-mode #sky-sunrise { opacity: 0; }
        #scene.sunset-mode #sky-sunset { opacity: 1; }

        /* --- The Sun --- */
        #sun-container {
            position: absolute; bottom: var(--sun-y); left: 50%;
            transform: translateX(-50%); width: 120px; height: 120px;
            z-index: 1; transition: bottom 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sun-state {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; transition: opacity 2s ease-in-out;
        }
        .sun-day {
            background: radial-gradient(circle, #ffffff 0%, #fff59d 70%, transparent 100%);
            box-shadow: 0 0 40px 10px rgba(255, 235, 59, 0.4);
            opacity: 1;
        }
        .sun-eve {
            background: radial-gradient(circle, #ffd000 0%, #ff7b00 70%, transparent 100%);
            box-shadow: 0 0 80px 20px rgba(255, 123, 0, 0.6);
            opacity: 0;
        }
        #scene.sunset-mode .sun-day { opacity: 0; }
        #scene.sunset-mode .sun-eve { opacity: 1; }

        /* --- Clouds --- */
        .cloud {
            position: absolute;
            background: rgba(var(--cloud-color), var(--cloud-opacity));
            border-radius: 50px; filter: blur(4px); z-index: 1;
            animation: drift linear infinite;
            transition: background 2s ease, opacity 2s ease;
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute;
            background: rgba(var(--cloud-color), var(--cloud-opacity));
            border-radius: 50%;
            transition: background 2s ease, opacity 2s ease;
        }
        .c1 { width: 180px; height: 50px; top: 60px; left: -200px; animation-duration: 45s; }
        .c1::before { width: 70px; height: 70px; top: -35px; left: 30px; }
        .c1::after { width: 90px; height: 90px; top: -45px; left: 70px; }
        
        .c2 { width: 140px; height: 40px; top: 130px; left: -200px; animation-duration: 35s; animation-delay: 5s; transform: scale(0.8); }
        .c2::before { width: 50px; height: 50px; top: -25px; left: 20px; }
        .c2::after { width: 70px; height: 70px; top: -35px; left: 50px; }

        .c3 { width: 220px; height: 60px; top: 40px; left: -250px; animation-duration: 60s; animation-delay: 15s; }
        .c3::before { width: 80px; height: 80px; top: -40px; left: 40px; }
        .c3::after { width: 110px; height: 110px; top: -55px; left: 80px; }

        @keyframes drift { 0% { transform: translateX(0); } 100% { transform: translateX(1200px); } }

        /* --- Scenery Elements --- */
        #mountains {
            position: absolute; bottom: 120px; width: 100%; height: 250px;
            z-index: 2; pointer-events: none;
            filter: drop-shadow(0 -5px 15px rgba(0,0,0,0.2));
        }
        .mount-b { fill: var(--mount-b1); transition: fill 2s ease; }
        .mount-f { fill: var(--mount-f1); transition: fill 2s ease; }

        /* --- Water Section --- */
        #water {
            position: absolute; bottom: 0; width: 100%; height: 140px;
            background: var(--water-base); z-index: 6;
            transition: background 2s ease;
        }
        .water-waves { position: absolute; top: -35px; width: 100%; height: 40px; }
        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; transition: fill 2s ease; }
        .w1 { animation-delay: -2s; animation-duration: 7s; fill: var(--water-w1); }
        .w2 { animation-delay: -3s; animation-duration: 10s; fill: var(--water-w2); }
        .w3 { animation-delay: -4s; animation-duration: 13s; fill: var(--water-w3); }
        .w4 { animation-delay: -5s; animation-duration: 20s; fill: var(--water-base); }

        @keyframes move-forever { 0% { transform: translate3d(-90px, 0, 0); } 100% { transform: translate3d(85px, 0, 0); } }

        /* Splash Effects */
        .splash {
            position: absolute; top: 20px; background: rgba(255, 255, 255, 0.85);
            border-radius: 50%; transform: translate(-50%, -50%) scale(0.2);
            opacity: 0; filter: blur(5px); pointer-events: none;
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }
        #splash-main { left: 450px; width: 350px; height: 100px; }
        .car-splash { width: 120px; height: 40px; background: rgba(255, 255, 255, 0.95); }
        #splash-car2 { left: 630px; } 
        #splash-car3 { left: 470px; }

        /* --- Towers --- */
        .tower-container {
            position: absolute; bottom: 110px; width: 60px; height: 350px;
            z-index: 3; display: flex; flex-direction: column; align-items: center;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.5));
        }
        #tower-left { left: 240px; }
        #tower-right { right: 240px; }

        /* Bridge materials transition via variables */
        .tower-top { width: 24px; height: 15px; background: linear-gradient(to right, var(--tower-dark), var(--tower-light)); transition: background 2s ease; }
        .tower-spire { width: 10px; height: 50px; background: linear-gradient(to right, var(--tower-dark), var(--tower-light)); transition: background 2s ease; }
        .tower-cross-top { width: 36px; height: 12px; background: linear-gradient(to right, var(--tower-dark), var(--tower-light)); transition: background 2s ease; }
        .tower-mid { 
            width: 22px; height: 100px; 
            background: linear-gradient(to right, var(--tower-dark), var(--tower-light)); 
            border-left: 4px solid var(--deck-side); 
            border-right: 4px solid var(--deck-side); 
            transition: background 2s ease, border-color 2s ease;
        }
        .tower-cross-bottom { width: 44px; height: 12px; background: linear-gradient(to right, var(--deck-side), var(--tower-dark)); transition: background 2s ease;}
        .tower-base { width: 26px; height: 161px; background: linear-gradient(to right, var(--deck-side), var(--tower-dark)); transition: background 2s ease;}

        /* Suspension Cables */
        #cables-svg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; pointer-events: none; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }
        .cable { stroke: #d1c8b8; stroke-width: 2; opacity: 0.8; }

        /* --- Bridge Deck Structure --- */
        .deck {
            position: absolute; bottom: 270px; height: 20px;
            background: linear-gradient(to bottom, var(--deck-top), var(--deck-side));
            z-index: 5; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: background 2s ease;
        }
        .deck::after {
            content: ''; position: absolute; top: 9px; left: 0; width: 100%; height: 2px;
            background: repeating-linear-gradient(90deg, rgba(255,255,255,0.8) 0, rgba(255,255,255,0.8) 15px, transparent 15px, transparent 30px);
        }

        #deck-left { left: 0; width: 260px; }
        #deck-right { right: 0; width: 260px; }
        #deck-mid { left: 260px; width: 380px; transform-origin: left bottom; }

        #cracks {
            position: absolute; top: -5px; left: 0; width: 100%; height: 30px;
            opacity: 0; pointer-events: none; z-index: 6;
        }

        /* Falling Debris Particles */
        .debris {
            position: absolute; bottom: 270px; width: 14px; height: 14px;
            background: #333; z-index: 5; opacity: 0; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        #deb1 { left: 270px; width: 20px; background: #444; }
        #deb2 { left: 630px; background: #222; }
        #deb3 { left: 580px; height: 10px; background: #555;}

        /* --- Vehicles --- */
        .car-wrapper { position: absolute; bottom: 290px; left: -100px; z-index: 6; filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.5));}
        .car { width: 50px; height: 20px; border-radius: 8px 12px 0 0; position: relative; }
        
        .car.red { background: linear-gradient(to bottom, #ff4757, #ff1e34); }
        .car.green { background: linear-gradient(to bottom, #2ed573, #1eab58); }
        .car.blue { background: linear-gradient(to bottom, #1e90ff, #0070d8); }
        
        .window { position: absolute; top: 4px; left: 8px; width: 12px; height: 8px; background: #f1f2f6; border-radius: 2px; }
        .window.right { left: 28px; }
        .wheel {
            position: absolute; bottom: -6px; width: 12px; height: 12px; background: #111;
            border-radius: 50%; border: 2px solid #a4b0be; box-shadow: inset 0 0 3px rgba(0,0,0,0.8);
        }
        .wheel.left { left: 6px; }
        .wheel.right { right: 6px; }

        /* --- Dynamic Animation Classes --- */
        .falling { transform: translateY(220px) rotate(12deg); transition: transform 0.6s cubic-bezier(0.55, 0.085, 0.68, 0.53); }
        .rewinding { transform: translateY(0) rotate(0); transition: transform 1.5s ease-in-out; }

        .car2-falling { transform: translate(600px, 210px) rotate(35deg) !important; transition: transform 0.6s cubic-bezier(0.55, 0.085, 0.68, 0.53) !important; }
        .car3-falling { transform: translate(450px, 200px) rotate(15deg) !important; transition: transform 0.55s cubic-bezier(0.55, 0.085, 0.68, 0.53) !important; }
        
        .falling-deb1 { transform: translateY(220px) translateX(-30px) rotate(-360deg); transition: transform 0.6s ease-in; opacity: 1 !important; }
        .falling-deb2 { transform: translateY(240px) translateX(40px) rotate(360deg); transition: transform 0.7s ease-in; opacity: 1 !important; }
        .falling-deb3 { transform: translateY(200px) translateX(20px) rotate(720deg); transition: transform 0.5s ease-in; opacity: 1 !important; }

        .splashing { transform: translate(-50%, -50%) scale(3.5) !important; opacity: 0 !important; transition: transform 0.6s ease-out, opacity 0.6s ease-out 0.2s !important; }
        .splashing-car { transform: translate(-50%, -50%) scale(2.2) !important; opacity: 0 !important; transition: transform 0.5s ease-out, opacity 0.5s ease-out 0.1s !important; }

        /* --- UI Controls --- */
        #controls {
            position: absolute; bottom: -70px; display: flex; justify-content: space-between;
            width: 100%; align-items: center; padding: 0 10px; box-sizing: border-box;
        }
        .mode-toggles { display: flex; gap: 10px; }
        button {
            padding: 10px 20px; font-size: 14px; font-weight: bold; cursor: pointer; border: none;
            border-radius: 6px; transition: all 0.2s; letter-spacing: 0.5px;
        }
        /* Action Button */
        #start-btn {
            background: linear-gradient(135deg, #ff4757, #ff1e34); color: white;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }
        #start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6); }
        #start-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; color: #aaa; transform: none;}
        
        /* Toggle Buttons */
        .toggle-btn { background: #333; color: #aaa; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .toggle-btn:hover { background: #444; }
        .toggle-btn.active { background: #f1c40f; color: #222; box-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        #btn-sunset.active { background: #ff7b00; color: #fff; box-shadow: 0 0 15px rgba(255, 123, 0, 0.5); }

    </style>
</head>
<body>

    <div class="container">
        <div id="scene">
            
            <!-- Sky Layers -->
            <div id="sky-sunrise"></div>
            <div id="sky-sunset"></div>

            <!-- Sun -->
            <div id="sun-container">
                <div class="sun-state sun-day"></div>
                <div class="sun-state sun-eve"></div>
            </div>

            <!-- Clouds -->
            <div class="cloud c1"></div>
            <div class="cloud c2"></div>
            <div class="cloud c3"></div>

            <!-- Background Mountains -->
            <svg id="mountains" viewBox="0 0 900 300" preserveAspectRatio="none">
                <polygon points="-50,300 150,150 400,300" class="mount-b" />
                <polygon points="300,300 550,120 800,300" class="mount-b" />
                <polygon points="650,300 850,160 1000,300" class="mount-b" />
                <polygon points="-100,300 100,200 350,300" class="mount-f" />
                <polygon points="200,300 450,180 700,300" class="mount-f" />
                <polygon points="550,300 750,190 950,300" class="mount-f" />
            </svg>

            <!-- Suspension Cables -->
            <svg id="cables-svg">
                <line x1="270" y1="120" x2="140" y2="265" class="cable" />
                <line x1="270" y1="120" x2="190" y2="265" class="cable" />
                <line x1="270" y1="120" x2="230" y2="265" class="cable" />
                <line x1="270" y1="120" x2="310" y2="265" class="cable mid-cable" />
                <line x1="270" y1="120" x2="350" y2="265" class="cable mid-cable" />
                <line x1="270" y1="120" x2="400" y2="265" class="cable mid-cable" />
                <line x1="630" y1="120" x2="500" y2="265" class="cable mid-cable" />
                <line x1="630" y1="120" x2="550" y2="265" class="cable mid-cable" />
                <line x1="630" y1="120" x2="590" y2="265" class="cable mid-cable" />
                <line x1="630" y1="120" x2="670" y2="265" class="cable" />
                <line x1="630" y1="120" x2="710" y2="265" class="cable" />
                <line x1="630" y1="120" x2="760" y2="265" class="cable" />
            </svg>

            <!-- Towers -->
            <div id="tower-left" class="tower-container">
                <div class="tower-top"></div><div class="tower-spire"></div>
                <div class="tower-cross-top"></div><div class="tower-mid"></div>
                <div class="tower-cross-bottom"></div><div class="tower-base"></div>
            </div>
            <div id="tower-right" class="tower-container">
                <div class="tower-top"></div><div class="tower-spire"></div>
                <div class="tower-cross-top"></div><div class="tower-mid"></div>
                <div class="tower-cross-bottom"></div><div class="tower-base"></div>
            </div>

            <!-- Bridge Deck Structure -->
            <div id="deck-left" class="deck"></div>
            <div id="deck-right" class="deck"></div>
            <div id="deck-mid" class="deck">
                <svg id="cracks" preserveAspectRatio="none" viewBox="0 0 380 30">
                    <path d="M 5 0 L 15 15 L 10 25 L 20 18" fill="none" stroke="#111" stroke-width="2.5"/>
                    <path d="M 360 0 L 365 15 L 350 20 L 370 25 L 375 18" fill="none" stroke="#111" stroke-width="2.5"/>
                    <path d="M 370 -5 L 360 10 L 375 20 L 365 30" fill="none" stroke="#111" stroke-width="2"/>
                </svg>
            </div>

            <!-- Hidden debris pieces -->
            <div id="deb1" class="debris"></div>
            <div id="deb2" class="debris"></div>
            <div id="deb3" class="debris"></div>

            <!-- Cars -->
            <div id="car1" class="car-wrapper">
                <div class="car red"><div class="window"></div><div class="window right"></div><div class="wheel left"></div><div class="wheel right"></div></div>
            </div>
            <div id="car2" class="car-wrapper" style="left: -100px;">
                <div class="car green"><div class="window"></div><div class="window right"></div><div class="wheel left"></div><div class="wheel right"></div></div>
            </div>
            <div id="car3" class="car-wrapper" style="left: -100px;">
                <div class="car blue"><div class="window"></div><div class="window right"></div><div class="wheel left"></div><div class="wheel right"></div></div>
            </div>

            <!-- Animated Water Foreground -->
            <div id="water">
                <svg class="water-waves" viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
                    <defs>
                        <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
                    </defs>
                    <g class="parallax">
                        <use href="#gentle-wave" x="48" y="0" class="w1"/>
                        <use href="#gentle-wave" x="48" y="3" class="w2"/>
                        <use href="#gentle-wave" x="48" y="5" class="w3"/>
                        <use href="#gentle-wave" x="48" y="7" class="w4"/>
                    </g>
                </svg>
                
                <!-- Independent Splashes -->
                <div id="splash-main" class="splash"></div>
                <div id="splash-car2" class="splash car-splash"></div>
                <div id="splash-car3" class="splash car-splash"></div>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls">
            <div class="mode-toggles">
                <button id="btn-sunrise" class="toggle-btn active">☀️ Sunrise</button>
                <button id="btn-sunset" class="toggle-btn">🌙 Sunset</button>
            </div>
            <button id="start-btn">▶ INITIATE COLLAPSE</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const scene = document.getElementById('scene');
        const btnSunrise = document.getElementById('btn-sunrise');
        const btnSunset = document.getElementById('btn-sunset');
        
        const deckMid = document.getElementById('deck-mid');
        const cracks = document.getElementById('cracks');
        const splashMain = document.getElementById('splash-main');
        const splashCar2 = document.getElementById('splash-car2');
        const splashCar3 = document.getElementById('splash-car3');
        const car1 = document.getElementById('car1');
        const car2 = document.getElementById('car2');
        const car3 = document.getElementById('car3');
        const deb1 = document.getElementById('deb1');
        const deb2 = document.getElementById('deb2');
        const deb3 = document.getElementById('deb3');
        const midCables = document.querySelectorAll('.mid-cable');
        const startBtn = document.getElementById('start-btn');

        // Theme Toggle Logic
        btnSunrise.addEventListener('click', () => {
            scene.classList.remove('sunset-mode');
            btnSunrise.classList.add('active');
            btnSunset.classList.remove('active');
        });

        btnSunset.addEventListener('click', () => {
            scene.classList.add('sunset-mode');
            btnSunset.classList.add('active');
            btnSunrise.classList.remove('active');
        });

        // Animation Logic
        let isAnimating = false;
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        function resetSplash(element, baseScale) {
            element.style.transition = 'none';
            element.classList.remove('splashing', 'splashing-car');
            element.style.transform = `translate(-50%, -50%) scale(${baseScale})`;
            element.style.opacity = '0';
        }

        async function playAnimationSequence() {
            if (isAnimating) return;
            isAnimating = true;
            startBtn.disabled = true;
            startBtn.innerText = "ANIMATION RUNNING...";

            // PHASE 1: Reset
            deckMid.className = 'deck';
            deb1.className = 'debris'; deb2.className = 'debris'; deb3.className = 'debris';
            cracks.style.transition = 'none'; cracks.style.opacity = '0';
            midCables.forEach(c => { c.style.transition = 'none'; c.style.opacity = '1'; });
            
            resetSplash(splashMain, 0.2);
            resetSplash(splashCar2, 0.2);
            resetSplash(splashCar3, 0.2);

            car2.classList.remove('car2-falling');
            car3.classList.remove('car3-falling');

            car1.style.transition = 'none'; car1.style.transform = 'translateX(0)'; 
            car2.style.transition = 'none'; car2.style.transform = 'translateX(0)'; 
            car3.style.transition = 'none'; car3.style.transform = 'translateX(0)'; 

            await sleep(800);

            // PHASE 2: Cars Drive
            car1.style.transition = 'transform 4.5s linear';
            car1.style.transform = 'translateX(1100px)'; 
            
            await sleep(1500);

            car2.style.transition = 'transform 2.5s ease-out';
            car2.style.transform = 'translateX(600px)'; 
            
            car3.style.transition = 'transform 2.8s ease-out';
            car3.style.transform = 'translateX(450px)'; 

            await sleep(2500); 

            // PHASE 3: Cracks & Snapping
            cracks.style.transition = 'opacity 0.2s ease-in';
            cracks.style.opacity = '1';

            midCables.forEach(c => {
                c.style.transition = 'opacity 0.2s ease-out';
                c.style.opacity = '0'; 
            });

            await sleep(600);

            // PHASE 4: Collapse
            deckMid.classList.add('falling');
            deb1.classList.add('falling-deb1');
            deb2.classList.add('falling-deb2');
            deb3.classList.add('falling-deb3');
            
            car2.classList.add('car2-falling');
            car3.classList.add('car3-falling');

            await sleep(450);

            // PHASE 5: Splash
            splashMain.style.opacity = '1';
            splashCar2.style.opacity = '0.9';
            splashCar3.style.opacity = '0.9';
            
            void splashMain.offsetWidth; void splashCar2.offsetWidth; void splashCar3.offsetWidth;
            
            splashMain.classList.add('splashing');
            splashCar2.classList.add('splashing-car');
            splashCar3.classList.add('splashing-car');

            await sleep(2500); 

            // PHASE 6: Rewind
            deckMid.classList.remove('falling');
            deckMid.classList.add('rewinding');
            
            deb1.classList.remove('falling-deb1'); deb2.classList.remove('falling-deb2'); deb3.classList.remove('falling-deb3');
            car2.classList.remove('car2-falling'); car3.classList.remove('car3-falling');
            
            deb1.style.opacity = '0'; deb2.style.opacity = '0'; deb3.style.opacity = '0';
            cracks.style.transition = 'opacity 1s ease-in-out';
            cracks.style.opacity = '0';

            midCables.forEach(c => {
                c.style.transition = 'opacity 1.5s ease-in-out';
                c.style.opacity = '1'; 
            });

            car1.style.transition = 'transform 1.5s ease-in-out'; car1.style.transform = 'translateX(0)';
            car2.style.transition = 'transform 1.5s ease-in-out'; car2.style.transform = 'translateX(0)';
            car3.style.transition = 'transform 1.5s ease-in-out'; car3.style.transform = 'translateX(0)';

            await sleep(1500); 
            deckMid.classList.remove('rewinding');

            isAnimating = false;
            startBtn.disabled = false;
            startBtn.innerText = "▶ INITIATE COLLAPSE";
        }

        startBtn.addEventListener('click', playAnimationSequence);
    </script>
</body>
</html>
